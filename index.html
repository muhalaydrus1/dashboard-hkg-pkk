<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Registrasi HKG PKK Ke-54</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --g-tua:#00796B;--g-mid:#00897B;--emas:#00A99D;--emas-l:#80CBC4;
      --krem:#F5FFFD;--putih:#FFFFFF;--gelap:#0D1F1E;
      --mid:#4A7B76;--terang:#E0F2F1;--border:rgba(0,121,107,0.12);
      --sw:240px;
      --H-bg:#D1FAE5;--H-tx:#065F46;--H-bd:#6EE7B7;
      --M-bg:#FEE2E2;--M-tx:#991B1B;--M-bd:#FCA5A5;
      --K-bg:#FEF9C3;--K-tx:#854D0E;--K-bd:#FDE047;
      --tbl-fs: 0.95rem;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--krem);color:var(--gelap);display:flex;min-height:100vh;}

    /* ══ SIDEBAR ══ */
    #sidebar{width:var(--sw);background:var(--g-tua);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform .25s ease;overflow-y:auto;}
    .sb-logo{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.08);}
    .sb-badge{width:40px;height:40px;background:var(--emas);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:var(--g-tua);margin-bottom:.6rem;}
    .sb-title{font-size:.82rem;font-weight:700;color:var(--putih);line-height:1.3;}
    .sb-sub{font-size:.65rem;color:var(--emas-l);font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-top:.2rem;}
    .sb-sec{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.3);padding:.9rem 1.25rem .35rem;}
    nav a{display:flex;align-items:center;gap:.6rem;padding:.55rem 1.25rem;font-size:.79rem;font-weight:500;color:rgba(255,255,255,.65);text-decoration:none;border-left:3px solid transparent;transition:all .15s;}
    nav a:hover{color:var(--putih);background:rgba(255,255,255,.06);}
    nav a.active{color:var(--emas-l);background:rgba(200,151,58,.12);border-left-color:var(--emas);font-weight:600;}
    .nav-icon{font-size:.85rem;flex-shrink:0;}
    .sb-foot{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,.08);}
    .s-pill{display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.5rem .75rem;}
    .s-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;animation:pulse 2s infinite;flex-shrink:0;}
    .s-dot.loading{background:var(--emas-l);animation:blink 1s infinite;}
    .s-dot.error{background:#F87171;animation:none;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .s-info{display:flex;flex-direction:column;}
    .s-txt{font-size:.7rem;font-weight:600;color:rgba(255,255,255,.8);font-family:'DM Mono',monospace;}
    .s-time{font-size:.62rem;color:rgba(255,255,255,.35);font-family:'DM Mono',monospace;margin-top:1px;}

    /* ══ MAIN ══ */
    #main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;}

    /* ══ TOPBAR ══ */
    #topbar{background:var(--putih);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05);}
    .tb-title{font-size:.9rem;font-weight:700;color:var(--g-tua);display:flex;align-items:center;gap:.5rem;}
    .tb-title span{color:var(--mid);font-weight:400;font-size:.8rem;}
    .btn-ref{background:var(--g-tua);color:var(--putih);border:none;border-radius:7px;padding:.4rem .9rem;font-size:.75rem;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:background .15s;}
    .btn-ref:hover{background:var(--g-mid);}
    .btn-ref:disabled{opacity:.5;cursor:not-allowed;}

    /* ══ PAGES ══ */
    .page{display:none;padding:1.75rem 2rem;flex-direction:column;gap:1.5rem;}
    .page.active{display:flex;}

    /* ══════════════════════════════════════
       HERO SUMMARY — 3D style
    ══════════════════════════════════════ */
    .hero-summary {
      background: linear-gradient(135deg, #00695C 0%, #00897B 60%, #00BCD4 100%);
      border-radius: 20px;
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 20px 60px rgba(27,67,50,0.35),
        0 8px 20px rgba(27,67,50,0.2),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .hero-summary::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .hero-summary::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(200,151,58,0.08);
    }
    .hero-eyebrow {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--emas-l);
      font-weight: 700;
      margin-bottom: 1rem;
      opacity: .9;
    }
    .hero-number {
      font-size: clamp(4rem, 10vw, 7rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      /* 3D text effect */
      color: #FFFFFF;
      text-shadow:
        0 1px 0 #ccc,
        0 2px 0 #c9c9c9,
        0 3px 0 #bbb,
        0 4px 0 #b9b9b9,
        0 5px 0 #aaa,
        0 6px 1px rgba(0,0,0,.1),
        0 0 5px rgba(0,0,0,.1),
        0 1px 3px rgba(0,0,0,.3),
        0 3px 5px rgba(0,0,0,.2),
        0 5px 10px rgba(0,0,0,.25),
        0 10px 10px rgba(0,0,0,.2),
        0 20px 20px rgba(0,0,0,.15);
      margin-bottom: .5rem;
      position: relative; z-index: 1;
      font-family: 'DM Mono', monospace;
    }
    .hero-label {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      margin-bottom: 1.5rem;
      position: relative; z-index: 1;
      letter-spacing: .01em;
    }
    .hero-pct-wrap {
      display: inline-flex;
      align-items: center;
      gap: .75rem;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: .6rem 1.5rem;
      position: relative; z-index: 1;
      backdrop-filter: blur(4px);
    }
    .hero-pct-label {
      font-size: .82rem;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
    }
    .hero-pct-value {
      font-size: 1.5rem;
      font-weight: 800;
      font-family: 'DM Mono', monospace;
      letter-spacing: -0.02em;
      /* 3D text smaller */
      color: var(--emas-l);
      text-shadow:
        0 1px 0 rgba(0,0,0,.3),
        0 2px 4px rgba(0,0,0,.2),
        0 4px 8px rgba(0,0,0,.15);
    }
    .hero-loading {
      color: rgba(255,255,255,0.4);
      font-family: 'DM Mono', monospace;
      font-size: 2rem;
      animation: blink 1s infinite;
    }

    /* ══ LEGEND ══ */
    .legend{display:flex;align-items:center;gap:1rem;background:var(--putih);border:1px solid var(--border);border-radius:10px;padding:.65rem 1rem;width:fit-content;flex-wrap:wrap;}
    .leg-lbl{font-size:.75rem;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.05em;}
    .leg-item{display:flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:500;}
    .leg-dot{width:10px;height:10px;border-radius:3px;}
    .ld-H{background:var(--H-bg);border:1.5px solid var(--H-bd);}
    .ld-M{background:var(--M-bg);border:1.5px solid var(--M-bd);}
    .ld-K{background:var(--K-bg);border:1.5px solid var(--K-bd);}

    /* ══ CARD ══ */
    .card{background:var(--putih);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
    .card-hdr{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;border-bottom:1px solid var(--border);background:rgba(27,67,50,.02);}
    .card-ttl-row{display:flex;align-items:center;gap:.55rem;}
    .card-pip{width:4px;height:18px;border-radius:2px;background:var(--emas);}
    .card-ttl{font-size:.88rem;font-weight:700;color:var(--g-tua);text-transform:uppercase;letter-spacing:.05em;}

    /* ══ TABLE ══ */
    .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    table{width:100%;border-collapse:collapse;font-size:var(--tbl-fs);}
    thead th{background:var(--g-tua);color:var(--putih);padding:.7rem 1rem;text-align:center;font-size:calc(var(--tbl-fs) - 0.05rem);font-weight:600;letter-spacing:.03em;white-space:nowrap;}
    thead th:first-child{text-align:left;}
    tbody td{padding:.55rem 1rem;border-bottom:1px solid var(--terang);vertical-align:middle;text-align:center;}
    tbody td:first-child{text-align:left;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover td{filter:brightness(.96);}

    /* numeric = center (already default), text first col = left (already default) */
    td.num{font-family:'DM Mono',monospace;font-weight:500;text-align:center;}

    /* cell status */
    td.c-H{background:var(--H-bg);color:var(--H-tx);}
    td.c-M{background:var(--M-bg);color:var(--M-tx);}
    td.c-K{background:var(--K-bg);color:var(--K-tx);}

    tr.row-total td{font-weight:700;background:rgba(27,67,50,.07)!important;color:var(--g-tua);}
    tr.row-prov td{font-weight:700;background:rgba(27,67,50,.04)!important;color:var(--g-tua);}
    tr.row-tidak-hadir td{background:#1a1a1a!important;color:#ffffff!important;font-style:italic;font-weight:500;}
    tr.row-tidak-hadir td.num{color:#ffffff!important;}

    /* ══ STATE ══ */
    .state-box{padding:3rem 2rem;text-align:center;color:var(--mid);}
    .spinner{width:28px;height:28px;border:3px solid var(--terang);border-top-color:var(--g-mid);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .75rem;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .state-box p{font-size:.88rem;line-height:1.6;}
    .state-box.err{color:#DC2626;}

    footer{text-align:center;padding:1.25rem 2rem;font-size:.72rem;color:var(--mid);border-top:1px solid var(--border);margin-top:auto;}
    footer b{color:var(--g-tua);}

    .burger{display:none;background:none;border:none;cursor:pointer;padding:.25rem;color:var(--g-tua);font-size:1.3rem;line-height:1;}
    #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}

    /* ══ PROVINCE PAGE ══ */
    .prov-page-wrap { display: flex; flex-direction: column; gap: 1.5rem; }

    /* Search bar */
    .prov-search-wrap {
      display: flex; align-items: center; gap: .75rem;
      background: var(--putih); border: 1.5px solid var(--border);
      border-radius: 12px; padding: .6rem 1rem;
      box-shadow: 0 1px 4px rgba(0,121,107,.06);
      transition: border-color .2s;
    }
    .prov-search-wrap:focus-within { border-color: var(--emas); }
    .prov-search-icon { color: var(--mid); font-size: 1rem; flex-shrink: 0; }
    .prov-search-wrap input {
      border: none; outline: none; width: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .9rem; color: var(--gelap); background: transparent;
    }
    .prov-search-wrap input::placeholder { color: var(--mid); }

    /* Grid */
    .prov-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    /* Card */
    .prov-card {
      background: var(--putih);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem .9rem;
      cursor: pointer;
      transition: all .2s cubic-bezier(.34,1.56,.64,1);
      display: flex; flex-direction: column; align-items: center;
      gap: .6rem; text-align: center;
      position: relative; overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,121,107,.05);
    }
    .prov-card::before {
      content: ''; position: absolute;
      inset: 0; background: linear-gradient(135deg, rgba(0,169,157,.06) 0%, transparent 100%);
      opacity: 0; transition: opacity .2s;
    }
    .prov-card:hover { transform: translateY(-4px) scale(1.02); border-color: var(--emas); box-shadow: 0 8px 24px rgba(0,169,157,.18); }
    .prov-card:hover::before { opacity: 1; }
    .prov-card.active-card { border-color: var(--emas); background: linear-gradient(135deg, rgba(0,169,157,.08), var(--putih)); box-shadow: 0 4px 16px rgba(0,169,157,.2); }
    .prov-card.hidden { display: none; }

    .prov-card-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--emas), var(--g-mid));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 4px 10px rgba(0,169,157,.25);
      transition: transform .2s;
    }
    .prov-card:hover .prov-card-icon { transform: scale(1.1) rotate(-3deg); }
    .prov-card-name {
      font-size: .78rem; font-weight: 700;
      color: var(--g-tua); line-height: 1.3;
      letter-spacing: .01em;
    }
    .prov-card-hint {
      font-size: .67rem; color: var(--mid);
      line-height: 1.4;
    }
    .prov-card-badge {
      position: absolute; top: .5rem; right: .5rem;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--emas); opacity: 0;
      transition: opacity .2s;
    }
    .prov-card.active-card .prov-card-badge { opacity: 1; }

    /* No results */
    .prov-empty-search {
      grid-column: 1/-1; padding: 2rem; text-align: center; color: var(--mid);
      font-size: .85rem;
    }

    /* Data panel */
    .prov-data-panel {
      background: var(--putih);
      border-radius: 16px;
      border: 1.5px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,121,107,.06);
      display: none;
    }
    .prov-data-panel.show { display: block; }

    .prov-data-header {
      background: linear-gradient(135deg, var(--g-tua), var(--g-mid));
      padding: 1.25rem 1.5rem;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
    }
    .prov-breadcrumb {
      font-size: .68rem; color: rgba(255,255,255,.55);
      font-weight: 500; margin-bottom: .35rem;
      letter-spacing: .03em;
    }
    .prov-breadcrumb span { color: rgba(255,255,255,.85); }
    .prov-data-title {
      font-size: 1.25rem; font-weight: 800;
      color: var(--putih); letter-spacing: -.01em;
    }
    .prov-data-title small {
      display: block; font-size: .72rem;
      color: rgba(255,255,255,.55); font-weight: 400;
      margin-top: .2rem;
    }
    .prov-nav-btns { display: flex; gap: .5rem; flex-shrink: 0; margin-top: .25rem; }
    .prov-nav-btn {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
      color: var(--putih); border-radius: 8px;
      padding: .4rem .75rem; font-size: .72rem; font-weight: 600;
      cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background .15s; white-space: nowrap;
    }
    .prov-nav-btn:hover { background: rgba(255,255,255,.22); }
    .prov-nav-btn:disabled { opacity: .35; cursor: not-allowed; }

    .prov-data-body { overflow-x: auto; }

    /* Loading spinner for province */
    .prov-loading {
      padding: 3rem 2rem; text-align: center; color: var(--mid);
    }
    .prov-loading .spinner { margin: 0 auto .75rem; }
    .prov-loading p { font-size: .85rem; }

    /* Empty state */
    .prov-empty-state {
      padding: 3rem 2rem; text-align: center;
    }
    .prov-empty-icon { font-size: 3rem; margin-bottom: .75rem; }
    .prov-empty-state h3 { font-size: 1rem; font-weight: 700; color: var(--g-tua); margin-bottom: .4rem; }
    .prov-empty-state p { font-size: .82rem; color: var(--mid); line-height: 1.6; }

    /* Welcome state */
    .prov-welcome {
      padding: 3rem 2rem; text-align: center;
    }
    .prov-welcome-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .prov-welcome h3 { font-size: 1.1rem; font-weight: 700; color: var(--g-tua); margin-bottom: .5rem; }
    .prov-welcome p { font-size: .85rem; color: var(--mid); line-height: 1.7; max-width: 360px; margin: 0 auto; }

    @media (max-width: 640px) {
      .prov-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: .75rem; }
      .prov-data-header { flex-direction: column; }
      .prov-nav-btns { width: 100%; }
      .prov-nav-btn { flex: 1; text-align: center; }
    }

    /* PDF Button */
    .btn-pdf {
      background: var(--emas); color: var(--g-tua);
      border: none; border-radius: 7px;
      padding: .4rem .9rem; font-size: .75rem; font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: .35rem;
    }
    .btn-pdf:hover { background: #00897B; color: #fff; }
    .btn-pdf:disabled { opacity: .5; cursor: not-allowed; }

    /* PDF capture area */
    .pdf-capture {
      background: #fff;
      padding: 1.5rem;
      border-radius: 0;
    }
    .pdf-title-block {
      margin-bottom: 1rem;
      padding-bottom: .75rem;
      border-bottom: 2px solid var(--g-tua);
    }
    .pdf-title-block h2 {
      font-size: 1rem; font-weight: 800;
      color: var(--g-tua); margin-bottom: .25rem;
    }
    .pdf-title-block p {
      font-size: .7rem; color: var(--mid);
    }
    .pdf-legend {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 1rem; flex-wrap: wrap;
      font-size: .72rem;
    }
    .pdf-legend-title { font-weight: 700; color: var(--mid); text-transform: uppercase; letter-spacing: .05em; }
    .pdf-legend-item { display: flex; align-items: center; gap: .3rem; font-weight: 500; }
    .pdf-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    @media print { .btn-pdf { display: none !important; } }

        /* ══ PDF / PRINT ══ */
    .btn-pdf {
      display:inline-flex; align-items:center; gap:.4rem;
      background: var(--emas); color: var(--g-tua);
      border:none; border-radius:7px;
      padding:.4rem .9rem; font-size:.75rem; font-weight:700;
      font-family:'Plus Jakarta Sans',sans-serif;
      cursor:pointer; transition:background .15s; flex-shrink:0;
    }
    .btn-pdf:hover { background: #00897B; color:#fff; }

    @media print {
      #sidebar, #topbar, #overlay, .btn-pdf, .btn-ref, .legend { display:none!important; }
      #main { margin-left:0!important; }
      .page { display:none!important; padding:0!important; }
      .page.print-target { display:block!important; }
      .page.print-target .legend { display:flex!important; flex-wrap:wrap; margin-bottom:.5rem; }
      body { background:#fff!important; }
      .card { box-shadow:none!important; border:1px solid #ccc!important; border-radius:0!important; }
      .card-hdr { background:#00796B!important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .card-ttl { color:#fff!important; }
      thead th { background:#00796B!important; color:#fff!important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      td.c-H { background:#D1FAE5!important; color:#065F46!important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      td.c-M { background:#FEE2E2!important; color:#991B1B!important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      td.c-K { background:#FEF9C3!important; color:#854D0E!important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      tr.row-prov td { background:#E0F2F1!important; color:#00796B!important; font-weight:700!important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      tr.row-total td { background:#B2DFDB!important; color:#004D40!important; font-weight:700!important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      tr.row-tidak-hadir td { background:#1a1a1a!important; color:#fff!important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .print-legend { display:flex!important; }
      .print-header { display:block!important; }
      table { font-size:9pt!important; }
      td, th { padding:4px 6px!important; }
    }
    .print-legend {
      display:none;
      align-items:center; gap:1rem; flex-wrap:wrap;
      margin-bottom:.75rem; font-size:8pt;
    }
    .print-legend-item { display:flex; align-items:center; gap:.3rem; font-size:8pt; }
    .print-legend-dot { width:10px; height:10px; border-radius:2px; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .print-header { display:none; font-size:10pt; font-weight:700; margin-bottom:.5rem; color:#00796B; }

    
    /* ══ SUMMARY POINTS DASHBOARD ══ */
    .sum-wrap { display:flex; flex-direction:column; gap:1.25rem; }

    /* Page Header */
    .sum-page-header { display:flex; align-items:flex-start; justify-content:space-between; }
    .sum-page-title { font-size:1.3rem; font-weight:800; color:var(--g-tua); letter-spacing:-.01em; }
    .sum-page-sub { font-size:.8rem; color:var(--mid); margin-top:.2rem; font-weight:500; }

    /* KPI Cards */
    .sum-kpi-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:.85rem; }
    .sum-kpi-card {
      background:var(--putih); border:1.5px solid var(--border);
      border-radius:14px; padding:1.25rem 1rem;
      display:flex; flex-direction:column; gap:.3rem;
      box-shadow:0 1px 4px rgba(0,121,107,.06);
      position:relative; overflow:hidden;
    }
    .sum-kpi-card::after {
      content:''; position:absolute; top:0; left:0; right:0; height:4px;
      border-radius:14px 14px 0 0;
    }
    .sum-kpi-card.kpi-main::after  { background:var(--g-tua); }
    .sum-kpi-card.kpi-teal::after  { background:#0097A7; }
    .sum-kpi-card.kpi-green::after { background:#10B981; }
    .sum-kpi-card.kpi-red::after   { background:#EF4444; }
    .sum-kpi-card.kpi-yellow::after{ background:#F59E0B; }
    .sum-kpi-icon { font-size:1.6rem; margin-bottom:.15rem; }
    .sum-kpi-label { font-size:.65rem; font-weight:700; color:var(--mid); text-transform:uppercase; letter-spacing:.07em; line-height:1.3; }
    .sum-kpi-value { font-size:2.4rem; font-weight:800; color:var(--gelap); line-height:1.05; font-family:'DM Mono',monospace; letter-spacing:-.02em; }
    .kv-pct { color:#059669!important; font-size:2.8rem!important; }
    .sum-kpi-card.kpi-main  .sum-kpi-value { color:var(--g-tua); }
    .sum-kpi-card.kpi-teal  .sum-kpi-value { color:#0097A7; }
    .sum-kpi-card.kpi-red   .sum-kpi-value { color:#DC2626; }
    .sum-kpi-card.kpi-yellow .sum-kpi-value { color:#D97706; }
    .sum-kpi-unit { font-size:.72rem; color:var(--mid); font-weight:500; }

    /* Progress */
    .sum-progress-wrap { margin-top:.35rem; }
    .sum-progress-track { height:8px; background:var(--terang); border-radius:99px; overflow:hidden; }
    .sum-progress-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--g-mid),#10B981); transition:width 1s ease; }
    .sum-progress-label { font-size:.65rem; color:var(--mid); margin-top:.3rem; font-family:'DM Mono',monospace; }

    /* Info Banner */
    .sum-info-banner {
      background:#EFF6FF; border:1px solid #BFDBFE; border-radius:10px;
      padding:.75rem 1rem; font-size:.82rem; color:#1E40AF; font-weight:500; line-height:1.5;
    }

    /* Status Section */
    .sum-status-section {
      background:var(--putih); border:1.5px solid var(--border);
      border-radius:14px; padding:1.25rem;
      display:flex; gap:1.25rem; align-items:flex-start;
      box-shadow:0 1px 4px rgba(0,121,107,.06);
    }
    .sum-status-left { flex-shrink:0; min-width:140px; }
    .sum-status-section-title { font-size:.95rem; font-weight:800; color:var(--g-tua); }
    .sum-status-section-sub { font-size:.72rem; color:var(--mid); margin-top:.25rem; line-height:1.4; }
    .sum-status-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.85rem; flex:1; }
    .sum-status-card {
      border-radius:12px; padding:1.1rem;
      display:flex; align-items:flex-start; gap:.85rem;
      border:1.5px solid transparent;
    }
    .ssc-green { background:#F0FDF4; border-color:#86EFAC; }
    .ssc-red   { background:#FFF5F5; border-color:#FCA5A5; }
    .ssc-yellow{ background:#FFFBEB; border-color:#FDE68A; }
    .sum-status-icon-lg { font-size:1.8rem; flex-shrink:0; margin-top:.1rem; }
    .sum-status-info { display:flex; flex-direction:column; gap:.2rem; }
    .sum-status-label-top { font-size:.65rem; font-weight:800; letter-spacing:.07em; }
    .slt-green { color:#059669; }
    .slt-red   { color:#DC2626; }
    .slt-yellow{ color:#D97706; }
    .sum-status-big { font-size:1.8rem; font-weight:800; font-family:'DM Mono',monospace; line-height:1; }
    .sum-status-big span { font-size:.85rem; font-weight:600; font-family:'Plus Jakarta Sans',sans-serif; }
    .sn-green { color:#059669; }
    .sn-red   { color:#DC2626; }
    .sn-yellow{ color:#D97706; }
    .sum-status-desc { font-size:.7rem; color:var(--mid); line-height:1.4; margin-top:.15rem; }

    /* Detail Cards */
    .sum-detail-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.85rem; }
    .sum-detail-card { background:var(--putih); border-radius:14px; overflow:hidden; box-shadow:0 1px 4px rgba(0,121,107,.06); display:flex; flex-direction:column; }
    .sdc-green { border:1.5px solid #86EFAC; }
    .sdc-red   { border:1.5px solid #FCA5A5; }
    .sdc-yellow{ border:1.5px solid #FDE68A; }
    .sum-detail-hdr { padding:.75rem 1rem; display:flex; align-items:center; gap:.5rem; }
    .dh-green  { background:#F0FDF4; }
    .dh-red    { background:#FFF5F5; }
    .dh-yellow { background:#FFFBEB; }
    .sum-detail-hdr-title { font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
    .dh-green  .sum-detail-hdr-title { color:#059669; }
    .dh-red    .sum-detail-hdr-title { color:#DC2626; }
    .dh-yellow .sum-detail-hdr-title { color:#D97706; }
    .sum-detail-body { padding:.85rem 1rem; flex:1; }
    .sum-prov-list { list-style:none; display:flex; flex-direction:column; gap:.35rem; padding:0; margin:0; }
    .sum-prov-list li { font-size:.78rem; color:var(--gelap); padding:.2rem 0; border-bottom:1px solid var(--terang); display:flex; align-items:center; gap:.4rem; line-height:1.4; }
    .sum-prov-list li:last-child { border-bottom:none; }
    .sum-prov-list-green li::before { content:"●"; color:#10B981; font-size:.6rem; flex-shrink:0; }
    .sum-prov-list-red   li::before { content:"●"; color:#EF4444; font-size:.6rem; flex-shrink:0; }
    .sum-prov-list-yellow li::before{ content:"●"; color:#F59E0B; font-size:.6rem; flex-shrink:0; }
    .sum-detail-footer { padding:.6rem 1rem; font-size:.75rem; font-weight:600; border-top:1px solid var(--terang); }
    .df-green  { background:#F0FDF4; color:#059669; }
    .df-red    { background:#FFF5F5; color:#DC2626; }
    .df-yellow { background:#FFFBEB; color:#D97706; }
    .sum-chip-empty { font-size:.78rem; color:var(--mid); font-style:italic; }

    @media(max-width:1100px) { .sum-kpi-grid { grid-template-columns:repeat(3,1fr); } }
    @media(max-width:768px) {
      .sum-kpi-grid    { grid-template-columns:repeat(2,1fr); }
      .sum-status-section { flex-direction:column; }
      .sum-status-grid { grid-template-columns:1fr; }
      .sum-detail-grid { grid-template-columns:1fr; }
      .sum-kpi-value   { font-size:1.8rem; }
    }
    @media(max-width:480px) { .sum-kpi-grid { grid-template-columns:1fr 1fr; } }
